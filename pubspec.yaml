name: scrolliq
description: ScrollIQ - Understand and reduce doomscrolling. Convert screen time into a Brain Score and compete with friends.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Supabase
  supabase_flutter: ^2.5.6

  # Auth
  google_sign_in: ^6.2.1

  # Networking / utilities
  dio: ^5.4.3+1
  dartz: ^0.10.1
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI / charts
  fl_chart: ^0.68.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  google_fonts: ^6.2.1

  # Permissions
  permission_handler: ^11.3.1

  # Local storage / env
  shared_preferences: ^2.2.3
  flutter_dotenv: ^5.1.0
  flutter_secure_storage: ^9.2.2

  # Date / time
  intl: ^0.19.0
  timezone: ^0.9.4

  # Analytics
  posthog_flutter: ^5.28.0

  # Push notifications
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.2
  flutter_local_notifications: ^17.1.2

  # Misc
  uuid: ^4.4.0
  collection: ^1.18.0
  logger: ^2.3.0
  url_launcher: ^6.2.5

  # Referrals / invites
  share_plus: ^10.1.2
  app_links: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
    - assets/images/
    - assets/lottie/
